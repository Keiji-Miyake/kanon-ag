language: ja

default_cli: gemini

# エージェント設定 (Role-based Model Configuration)
# 役割ごとに使用するCLI、モデル、およびフォールバック（代わりのモデル・CLI）を定義します。
agents:
  architect:
    cli: copilot
    model_primary: github-copilot/claude-opus-4.6
    model_backups: gemini-3-flash-preview, github-copilot/gpt-5.4

  reviewer:
    cli: copilot
    model_primary: github-copilot/gpt-5.4
    model_backups: github-copilot/claude-opus-4.6, gemini-3-flash-preview

  developer:
    cli: opencode
    model_primary: github-copilot/claude-opus-4.6
    model_backups: github-copilot/gpt-5.4, github-copilot/claude-sonnet-4.6

  creator:
    cli: copilot
    model_primary: github-copilot/claude-opus-4.6
    model_backups: github-copilot/gpt-5.4

  tester:
    cli: copilot
    model_primary: github-copilot/gpt-5.4
    model_backups: github-copilot/claude-opus-4.6

# スキルと使用するデフォルトのCLIのマッピング
skill_cli_mapping:
  architect: copilot
  reviewer: copilot
  developer: opencode
  creator: copilot
  tester: copilot

# CLI のコマンドオプション定義
cli_definitions:
  gemini:
    command: gemini
    prompt_flag: "-p"
    auto_approve: "--approval-mode=yolo"
    output_format: "-o json"
    workspace_flag: "--include-directories"
    resume_flag: "--resume"
  copilot:
    command: copilot
    prompt_flag: "-p"
    auto_approve: "--yolo"
    output_format: null
    workspace_flag: "--add-dir"
    resume_flag: "--resume"
  opencode:
    command: opencode
    subcommand: run
    prompt_flag: null
    auto_approve: null
    output_format: "--format json"
    workspace_flag: null
    resume_flag: "--continue"
